<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light" style="display: none;" id="body-dashboard">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Panel Administrativo ETS</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3 d-none d-sm-inline" id="admin-name">Cargando...</span>
                <button id="btn-logout" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
            <h3 class="mb-0">Gestión de Exámenes Programados</h3>
            <div class="d-flex gap-2">
                <button id="btn-pdf" class="btn btn-outline-danger d-flex align-items-center gap-2">
                    Descargar Reporte PDF
                </button>
                <button id="btn-carreras" class="btn btn-outline-primary">🎓 Carreras</button>
                <button id="btn-espacios" class="btn btn-outline-primary">🏢 Espacios</button>
                <button id="btn-nuevo" class="btn btn-success">+ Nuevo Examen</button>
            </div>
        </div>

        <div class="row mb-4" id="contenedor-estadisticas">
            </div>

        <section class="card shadow-sm">
            <div class="card-body p-2 p-md-4">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <input type="text" id="buscador-admin" class="form-control shadow-sm border-primary" placeholder="🔍 Buscar por materia, profesor, salón o turno...">
                    </div>
                </div>
        
                <div class="table-responsive bg-white shadow-sm rounded">
                    <table class="table table-striped table-hover align-middle mb-0" id="tabla-reporte">
                        <thead class="table-dark">
                            <tr>
                                <th>Materia</th>
                                <th>Carrera</th>
                                <th class="text-center">Sem.</th>
                                <th>Espacio</th> 
                                <th>Profesor</th> 
                                <th>Fecha</th>
                                <th>Turno</th>
                                <th class="col-acciones">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-admin-examenes">
                            <tr>
                                <td colspan="8" class="text-center text-muted">Cargando datos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="modalExamen" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Datos del Examen</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="form-examen">
                        <input type="hidden" id="examen-id">
                        
                        <div class="row mb-3">
                            <div class="col-md-8 mb-3 mb-md-0">
                                <label class="form-label">Unidad de Aprendizaje (Materia)</label>
                                <input type="text" class="form-control" id="materia" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Semestre</label>
                                <input type="number" class="form-control" id="semestre" min="1" max="8" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="form-label">Fecha</label>
                                <input type="date" class="form-control" id="fecha" required>
                            </div>
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="form-label">Hora</label>
                                <input type="time" class="form-control" id="hora" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Turno</label>
                                <select class="form-control" id="turno" required>
                                    <option value="Matutino">Matutino</option>
                                    <option value="Vespertino">Vespertino</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Profesor Evaluador</label>
                            <input type="text" class="form-control" id="profesor" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">Carrera</label>
                                <select class="form-control" id="carrera_id" required>
                                    <option value="">Cargando carreras...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Edificio / Salón</label>
                                <select class="form-control" id="espacio_id" required>
                                    <option value="">Cargando espacios...</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" id="btn-guardar-examen">Guardar Examen</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCarreras" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Gestión de Carreras</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="input-group mb-3">
                        <input type="text" id="nueva-carrera" class="form-control" placeholder="Nombre de la nueva carrera...">
                        <button class="btn btn-success" id="btn-guardar-carrera">Agregar</button>
                    </div>
                    <ul class="list-group" id="lista-carreras">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEspacios" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Gestión de Espacios (Salones)</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row mb-3">
                        <div class="col-5">
                            <input type="text" id="nuevo-edificio" class="form-control" placeholder="Edificio (Ej. 1)">
                        </div>
                        <div class="col-4">
                            <input type="text" id="nuevo-salon" class="form-control" placeholder="Salón (Ej. 104)">
                        </div>
                        <div class="col-3">
                            <button class="btn btn-success w-100" id="btn-guardar-espacio">Añadir</button>
                        </div>
                    </div>
                    <ul class="list-group" id="lista-espacios">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/dashboard.js?v=4"></script>
</body>
</html>
