<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo - Gestión ETS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow" style="width: 100%; max-width: 400px;">
        <div class="card-header bg-dark text-white text-center">
            <h4 class="mb-0">Panel de Administración</h4>
        </div>
        <div class="card-body p-4">
            <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

            <form id="form-login">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" id="username" class="form-control" required autocomplete="off">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
            </form>
            <div class="text-center mt-3">
                <a href="index.html" class="text-decoration-none text-muted">← Volver al buscador público</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
